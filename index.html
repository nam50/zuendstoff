<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zündstoff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Zündstoff</h1>
            <div class="header-actions">
                <button id="lang-btn" class="text-btn" title="Sprache wechseln / Change language">EN</button>
                <button id="shuffle-btn" class="icon-btn" title="Karten mischen / Shuffle cards">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                </button>
            </div>
        </header>
        
        <main class="card-container" id="card-container">
            <!-- Cards will be injected here by JS -->
            <div class="end-message" id="end-message">
                <h2>Das war's!</h2>
                <p>Keine weiteren Fragen verfügbar.</p>
                <button id="restart-btn" class="restart-btn">Neu starten</button>
            </div>
        </main>
    </div>
    
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
